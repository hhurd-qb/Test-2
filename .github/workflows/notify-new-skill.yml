name: Notify on New Skill

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new skill files
        id: new_skills
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'skills/*.md')
          echo "files=$NEW_FILES" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: steps.new_skills.outputs.files != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.OUTLOOK_EMAIL }}
          password: ${{ secrets.OUTLOOK_PASSWORD }}
          subject: "New Skill Added: ${{ steps.new_skills.outputs.files }}"
          to: hhurd@quickbase.com
          from: hhurd@quickbase.com
          body: |
            A new skill has been added to the company skill library.

            File(s): ${{ steps.new_skills.outputs.files }}

            View it on GitHub:
            https://github.com/Hankh005/Test-2/tree/main/${{ steps.new_skills.outputs.files }}

            ---
            This is an automated notification from your Claude Skill Library.
