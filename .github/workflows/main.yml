import requests, base64

def push_file(repo, path, content, message, token):
    url = f"https://api.github.com/repos/{repo}/contents/{path}"
    # Check if file exists (need its sha to update vs create)
    resp = requests.get(url, headers={"Authorization": f"token {token}"})
    sha = resp.json().get("sha") if resp.status_code == 200 else None

    payload = {
        "message": message,
        "content": base64.b64encode(content.encode()).decode(),
        "branch": "main",
    }
    if sha:
        payload["sha"] = sha  # required when overwriting an existing file

    r = requests.put(url, json=payload, headers={"Authorization": f"token {token}"})
    return r.json()
