name: Sync Confluence Skills

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch: {}       # adds a manual "Run workflow" button in the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests markdownify

      - name: Pull pages from Confluence and write files
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_ID: ${{ secrets.CONFLUENCE_SPACE_ID }}
        run: python scripts/sync_confluence.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "confluence-sync-bot"
          git config user.email "actions@github.com"
          git add skills/
          git diff --cached --quiet || git commit -m "Sync skills from Confluence [automated]"
          git push
